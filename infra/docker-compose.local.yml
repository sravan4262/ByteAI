# ByteAI — Local Docker stack
# Builds from source, runs full service stack with a local Postgres.
#
# Usage:
#   cp infra/.env.example infra/.env   # fill in secrets once
#   docker compose -f infra/docker-compose.local.yml up --build
#
# Frontend runs separately: cd UI && pnpm dev (uses .env.docker)
#   cp UI/.env.docker UI/.env.local
#
# Ports:
#   Gateway  → http://localhost:8090  (entry point for frontend)
#   API      → http://localhost:8080  (internal, exposed for direct testing)
#   Postgres → localhost:5432

services:

  # ── Database ─────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       byteai
      POSTGRES_USER:     byteai
      POSTGRES_PASSWORD: byteai
    volumes:
      - pg_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byteai -d byteai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations + Seeds (one-shot, runs then exits) ────────────────────────────
  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BYTEAI_DB_URL: postgresql://byteai:byteai@postgres:5432/byteai
    volumes:
      - ../supabase:/supabase:ro
    entrypoint: ["sh", "-c", "
      apk add --no-cache bash &&
      BYTEAI_DB_URL=postgresql://byteai:byteai@postgres:5432/byteai
        bash /supabase/scripts/migrate.sh &&
      BYTEAI_DB_URL=postgresql://byteai:byteai@postgres:5432/byteai
        bash /supabase/scripts/seed.sh
    "]
    restart: "no"

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ../Service
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT:        Local
      ConnectionStrings__Postgres:   Host=postgres;Port=5432;Database=byteai;Username=byteai;Password=byteai
      Clerk__Authority:              ${CLERK_AUTHORITY}
      Clerk__WebhookSecret:          ${CLERK_WEBHOOK_SECRET}
      Groq__ApiKey:                  ${GROQ_API_KEY}
      Cors__AllowedOrigin:           http://localhost:3000
      Supabase__Url:                 ${SUPABASE_URL:-}
      Supabase__ServiceRoleKey:      ${SUPABASE_SERVICE_ROLE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ── Gateway ───────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ../Service
      dockerfile: Dockerfile.gateway
    ports:
      - "8090:8090"
    environment:
      ASPNETCORE_ENVIRONMENT: Local
      ApiUpstreamUrl:         http://api:8080
      ApiKeys:                dev-local-key
      Cors__AllowedOrigin:    http://localhost:3000
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data_local:
