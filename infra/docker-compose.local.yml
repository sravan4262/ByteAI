# ByteAI — Local Docker stack
# Uses your local Supabase instance (supabase start) for the database.
# No postgres container — DB runs on your Mac at localhost:54322.
#
# Usage:
#   1. supabase start                              (start local Supabase)
#   2. docker compose -f infra/docker-compose.local.yml up --build
#   3. cd UI && cp .env.docker .env.local && pnpm dev
#
# Ports:
#   Gateway  → http://localhost:8090  (entry point for frontend)
#   API      → http://localhost:8080  (internal, exposed for direct testing)

services:

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ../Service
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT:        LocalDocker
      ConnectionStrings__Postgres:   Host=host.docker.internal;Port=54322;Database=postgres;Username=postgres;Password=postgres
      Clerk__Authority:              ${CLERK_AUTHORITY}
      Clerk__WebhookSecret:          ${CLERK_WEBHOOK_SECRET}
      Groq__ApiKey:                  ${GROQ_API_KEY}
      Cors__AllowedOrigin:           http://localhost:3000
      Supabase__Url:                 ${SUPABASE_URL:-}
      Supabase__ServiceRoleKey:      ${SUPABASE_SERVICE_ROLE_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ── Gateway ───────────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ../Service
      dockerfile: Dockerfile.gateway
    ports:
      - "8090:8090"
    environment:
      ASPNETCORE_ENVIRONMENT: LocalDocker
      ApiUpstreamUrl:         http://api:8080
      ApiKeys:                dev-local-key
      Cors__AllowedOrigin:    http://localhost:3000
    depends_on:
      api:
        condition: service_healthy
