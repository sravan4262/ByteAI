# ByteAI — Legacy compose file (kept for reference).
# Use docker-compose.local.yml for local development.
# Use docker-compose.prod.yml for prod-parity smoke testing.
#
# Quick start (still works, no gateway):
#   docker compose -f infra/docker-compose.yml up --build

services:
  api:
    build:
      context: ../Service
      dockerfile: Dockerfile.api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT:        LocalDocker
      ConnectionStrings__Postgres:   Host=postgres;Port=5432;Database=byteai;Username=byteai;Password=byteai
      Groq__ApiKey:                  ${GROQ_API_KEY}
      Cors__AllowedOrigin:           http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       byteai
      POSTGRES_USER:     byteai
      POSTGRES_PASSWORD: byteai
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byteai -d byteai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
