name: Deploy Service (Blue-Green)

on:
  workflow_run:
    workflows: ["Build & Test (CI)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Image SHA to deploy (leave blank for latest main)"
        required: false
        default: ""

env:
  IMAGE_API:      ghcr.io/${{ github.repository_owner }}/byteai-api
  IMAGE_GATEWAY:  ghcr.io/${{ github.repository_owner }}/byteai-gateway
  RESOURCE_GROUP: byteai-rg
  API_APP:        byteai-api
  GATEWAY_APP:    byteai-gateway
  ENV_NAME:       byteai-env

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Gate: only proceed when CI succeeded or manually triggered
  # ─────────────────────────────────────────────────────────────────────────────
  gate:
    name: Gate — CI must have succeeded
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - run: echo "CI passed or manual trigger — proceeding with deployment"

  # ─────────────────────────────────────────────────────────────────────────────
  # Resolve: detect which label is live, compute the inactive (deploy target),
  # build a unique suffix, and collect FQDNs needed downstream.
  #
  # Label convention:
  #   blue  / green — the two permanent slots.
  #   The label with 100% ingress traffic = active (live).
  #   The other label                     = inactive (deploy target).
  #
  # First deploy: no labels exist yet → default active=blue, inactive=green.
  # ─────────────────────────────────────────────────────────────────────────────
  resolve:
    name: Resolve — active label, suffix, FQDNs
    runs-on: ubuntu-latest
    needs: gate
    outputs:
      sha:        ${{ steps.vars.outputs.sha }}
      suffix:     ${{ steps.vars.outputs.suffix }}
      active:     ${{ steps.vars.outputs.active }}
      inactive:   ${{ steps.vars.outputs.inactive }}
      gw_fqdn:    ${{ steps.vars.outputs.gw_fqdn }}
      env_domain: ${{ steps.vars.outputs.env_domain }}

    steps:
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve deployment variables
        id: vars
        run: |
          # ── Deploy SHA ──────────────────────────────────────────────────────
          if [[ -n "${{ inputs.sha }}" ]]; then
            SHA="${{ inputs.sha }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "Deploy SHA: $SHA"

          # ── Detect active label from API ingress traffic ─────────────────────
          # Reads which label currently holds 100% traffic weight.
          # Falls back to "blue" active / "green" inactive on first deploy.
          ACTIVE_LABEL=$(az containerapp show \
            -n "$API_APP" -g "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.traffic[?weight==\`100\`].label | [0]" \
            -o tsv 2>/dev/null || echo "")

          if [[ "$ACTIVE_LABEL" == "blue" ]]; then
            INACTIVE_LABEL="green"
          elif [[ "$ACTIVE_LABEL" == "green" ]]; then
            INACTIVE_LABEL="blue"
          else
            echo "No active label found — first deploy, defaulting: active=blue inactive=green"
            ACTIVE_LABEL="blue"
            INACTIVE_LABEL="green"
          fi

          echo "Active label (live):    $ACTIVE_LABEL"
          echo "Inactive label (target): $INACTIVE_LABEL"

          # ── Unique suffix: slot-initial + sha6 + epoch-last-4 ───────────────
          # Epoch suffix prevents collisions if the same SHA is redeployed.
          SHA_SHORT=$(echo "$SHA" | cut -c1-6)
          TS=$(printf '%04d' $(( $(date +%s) % 10000 )))
          SUFFIX="${INACTIVE_LABEL:0:1}-${SHA_SHORT}-${TS}"
          echo "Revision suffix: $SUFFIX"

          # ── External FQDN (gateway) + env default domain ────────────────────
          GW_FQDN=$(az containerapp show \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          ENV_DOMAIN=$(az containerapp env show \
            -n "$ENV_NAME" -g "$RESOURCE_GROUP" \
            --query "properties.defaultDomain" -o tsv)

          echo "Gateway FQDN: $GW_FQDN"
          echo "Env domain:   $ENV_DOMAIN"

          echo "sha=$SHA"                  >> $GITHUB_OUTPUT
          echo "suffix=$SUFFIX"            >> $GITHUB_OUTPUT
          echo "active=$ACTIVE_LABEL"      >> $GITHUB_OUTPUT
          echo "inactive=$INACTIVE_LABEL"  >> $GITHUB_OUTPUT
          echo "gw_fqdn=$GW_FQDN"         >> $GITHUB_OUTPUT
          echo "env_domain=$ENV_DOMAIN"    >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy API: create new revision at 0% traffic with min-replicas=1 so ACA
  # starts the container immediately (no traffic needed to wake it up).
  # Label the revision with the inactive slot name once it is Running.
  # API is internal — health is verified via running state, not HTTP.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → ${{ needs.resolve.outputs.inactive }} slot
    runs-on: ubuntu-latest
    needs: resolve
    env:
      SHA:      ${{ needs.resolve.outputs.sha }}
      SUFFIX:   ${{ needs.resolve.outputs.suffix }}
      INACTIVE: ${{ needs.resolve.outputs.inactive }}

    steps:
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Guard — API must be in Multiple revision mode
        run: |
          MODE=$(az containerapp show -n "$API_APP" -g "$RESOURCE_GROUP" \
            --query "properties.configuration.activeRevisionsMode" -o tsv)
          if [[ "$MODE" != "Multiple" ]]; then
            echo "ERROR: $API_APP is not in Multiple revision mode (got: $MODE). Fix in Terraform."
            exit 1
          fi
          echo "$API_APP revision mode: $MODE ✓"

      - name: Create new API revision (0% traffic, min-replicas=1)
        run: |
          az containerapp update \
            -n "$API_APP" -g "$RESOURCE_GROUP" \
            --image "$IMAGE_API:$SHA" \
            --revision-suffix "$SUFFIX" \
            --min-replicas 1 \
            --set-env-vars \
              "ConnectionStrings__Postgres=${{ secrets.DATABASE_URL }}" \
              "Gemini__ApiKey=${{ secrets.GEMINI_API_KEY }}" \
              "Cors__AllowedOrigin=${{ secrets.FRONTEND_URL }}" \
              "Supabase__Url=${{ secrets.SUPABASE_URL }}" \
              "Supabase__JwtSecret=${{ secrets.SUPABASE_JWT_SECRET }}" \
              "Supabase__ServiceRoleKey=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --no-wait
          echo "Submitted revision: ${API_APP}--${SUFFIX}"

      - name: Poll API revision → Running (30 × 15s = 7.5 min max)
        run: |
          REV="${API_APP}--${SUFFIX}"
          for i in $(seq 1 30); do
            STATE=$(az containerapp revision show \
              -n "$API_APP" -g "$RESOURCE_GROUP" \
              --revision "$REV" \
              --query "properties.runningState" -o tsv 2>/dev/null || echo "Unknown")
            echo "  Attempt $i/30: $STATE"
            if [[ "$STATE" == "Running" || "$STATE" == "RunningAtMaxScale" ]]; then
              echo "API revision $REV is $STATE ✓"
              exit 0
            fi
            if [[ "$STATE" == "Stopped" || "$STATE" == "Failed" || "$STATE" == "Degraded" ]]; then
              echo "ERROR: API revision entered terminal state: $STATE"
              exit 1
            fi
            if [[ "$STATE" == "ScaledToZero" ]]; then
              echo "ERROR: API revision ScaledToZero — min-replicas=1 was not applied. Check image pull and app startup logs."
              exit 1
            fi
            sleep 15
          done
          echo "ERROR: API revision did not reach Running state within 7.5 minutes"
          exit 1

      - name: Label API revision as '${{ env.INACTIVE }}' slot
        run: |
          az containerapp revision label add \
            -n "$API_APP" -g "$RESOURCE_GROUP" \
            --revision "${API_APP}--${SUFFIX}" \
            --label "$INACTIVE" \
            --yes
          echo "Labeled ${API_APP}--${SUFFIX} → '$INACTIVE' ✓"

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy Gateway: same pattern as API but also runs an HTTP health check via
  # the ACA label URL (external app, so reachable from CI directly).
  # Runs after API is confirmed Running — gateway needs a live API to route to.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-gateway:
    name: Deploy Gateway → ${{ needs.resolve.outputs.inactive }} slot
    runs-on: ubuntu-latest
    needs: [resolve, deploy-api]
    env:
      SHA:        ${{ needs.resolve.outputs.sha }}
      SUFFIX:     ${{ needs.resolve.outputs.suffix }}
      INACTIVE:   ${{ needs.resolve.outputs.inactive }}
      ENV_DOMAIN: ${{ needs.resolve.outputs.env_domain }}

    steps:
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Guard — Gateway must be in Multiple revision mode
        run: |
          MODE=$(az containerapp show -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --query "properties.configuration.activeRevisionsMode" -o tsv)
          if [[ "$MODE" != "Multiple" ]]; then
            echo "ERROR: $GATEWAY_APP is not in Multiple revision mode (got: $MODE). Fix in Terraform."
            exit 1
          fi
          echo "$GATEWAY_APP revision mode: $MODE ✓"

      - name: Create new Gateway revision (0% traffic, min-replicas=1)
        run: |
          az containerapp update \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --image "$IMAGE_GATEWAY:$SHA" \
            --revision-suffix "$SUFFIX" \
            --min-replicas 1 \
            --set-env-vars \
              "ApiUpstreamUrl=http://$API_APP" \
              "ApiKeys=${{ secrets.API_KEYS }}" \
              "Cors__AllowedOrigin=${{ secrets.FRONTEND_URL }}" \
            --no-wait
          echo "Submitted revision: ${GATEWAY_APP}--${SUFFIX}"

      - name: Poll Gateway revision → Running (30 × 15s = 7.5 min max)
        run: |
          REV="${GATEWAY_APP}--${SUFFIX}"
          for i in $(seq 1 30); do
            STATE=$(az containerapp revision show \
              -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
              --revision "$REV" \
              --query "properties.runningState" -o tsv 2>/dev/null || echo "Unknown")
            echo "  Attempt $i/30: $STATE"
            if [[ "$STATE" == "Running" || "$STATE" == "RunningAtMaxScale" ]]; then
              echo "Gateway revision $REV is $STATE ✓"
              break
            fi
            if [[ "$STATE" == "Stopped" || "$STATE" == "Failed" || "$STATE" == "Degraded" ]]; then
              echo "ERROR: Gateway revision entered terminal state: $STATE"
              exit 1
            fi
            if [[ "$STATE" == "ScaledToZero" ]]; then
              echo "ERROR: Gateway revision ScaledToZero — min-replicas=1 was not applied. Check image pull and app startup logs."
              exit 1
            fi
            if [[ "$i" -eq 30 ]]; then
              echo "ERROR: Gateway revision did not reach Running state within 7.5 minutes"
              exit 1
            fi
            sleep 15
          done

      - name: Label Gateway revision as '${{ env.INACTIVE }}' slot
        run: |
          az containerapp revision label add \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --revision "${GATEWAY_APP}--${SUFFIX}" \
            --label "$INACTIVE" \
            --yes
          echo "Labeled ${GATEWAY_APP}--${SUFFIX} → '$INACTIVE' ✓"

      - name: HTTP health check — Gateway via label URL (12 × 10s)
        continue-on-error: true
        run: |
          # Label URL format: https://<label>---<app>.<env-domain>
          # Running state poll above is the hard gate — this is a best-effort
          # pre-swap sanity check via the public endpoint.
          LABEL_URL="https://${INACTIVE}---${GATEWAY_APP}.${ENV_DOMAIN}/health/ready"
          echo "Probing: $LABEL_URL"
          for i in $(seq 1 12); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$LABEL_URL" || echo "000")
            echo "  Attempt $i/12: HTTP $HTTP"
            if [[ "$HTTP" == "200" ]]; then
              echo "Gateway label health check passed ✓"
              exit 0
            fi
            sleep 10
          done
          echo "WARNING: Gateway label health check timed out — proceeding (Running state is the real gate)"
          exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Swap: atomically shift 100% traffic to the new (inactive) label on both apps.
  # Uses label-weight routing — no raw revision names needed.
  # On smoke failure: auto-rollback by routing back to the active label.
  # ─────────────────────────────────────────────────────────────────────────────
  swap:
    name: Swap traffic → ${{ needs.resolve.outputs.inactive }} + smoke test
    runs-on: ubuntu-latest
    needs: [resolve, deploy-gateway]
    env:
      ACTIVE:   ${{ needs.resolve.outputs.active }}
      INACTIVE: ${{ needs.resolve.outputs.inactive }}
      GW_FQDN:  ${{ needs.resolve.outputs.gw_fqdn }}

    steps:
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap API traffic → ${{ env.INACTIVE }} label (100%)
        run: |
          # Check whether the active label exists in traffic config (not present on first deploy)
          HAS_ACTIVE=$(az containerapp show \
            -n "$API_APP" -g "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.traffic[?label=='${ACTIVE}'].revisionName | [0]" \
            -o tsv 2>/dev/null || echo "")

          if [[ -n "$HAS_ACTIVE" ]]; then
            az containerapp ingress traffic set \
              -n "$API_APP" -g "$RESOURCE_GROUP" \
              --label-weight ${INACTIVE}=100 ${ACTIVE}=0
          else
            az containerapp ingress traffic set \
              -n "$API_APP" -g "$RESOURCE_GROUP" \
              --label-weight ${INACTIVE}=100
          fi
          echo "API traffic → $INACTIVE (100%) ✓"

      - name: Swap Gateway traffic → ${{ env.INACTIVE }} label (100%)
        run: |
          HAS_ACTIVE=$(az containerapp show \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.traffic[?label=='${ACTIVE}'].revisionName | [0]" \
            -o tsv 2>/dev/null || echo "")

          if [[ -n "$HAS_ACTIVE" ]]; then
            az containerapp ingress traffic set \
              -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
              --label-weight ${INACTIVE}=100 ${ACTIVE}=0
          else
            az containerapp ingress traffic set \
              -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
              --label-weight ${INACTIVE}=100
          fi
          echo "Gateway traffic → $INACTIVE (100%) ✓"

      - name: Post-swap smoke test — production endpoint (10 × 15s)
        id: smoke
        run: |
          echo "Smoke testing: https://$GW_FQDN/health/ready"
          PASSED=false
          for i in $(seq 1 10); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://$GW_FQDN/health/ready" || echo "000")
            echo "  Attempt $i/10: HTTP $HTTP"
            if [[ "$HTTP" == "200" ]]; then
              echo "Smoke test passed ✓"
              PASSED=true
              break
            fi
            sleep 15
          done
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          if [[ "$PASSED" != "true" ]]; then
            echo "ERROR: Production smoke test failed (last HTTP: $HTTP)"
            exit 1
          fi

      - name: AUTO-ROLLBACK — restore ${{ env.ACTIVE }} label to 100%
        if: failure()
        run: |
          echo "ROLLBACK: smoke test failed — routing traffic back to $ACTIVE label"

          # Reactivate the standby revision in case it was already deactivated
          # by a previous cleanup run (query by label from traffic config).
          for APP in "$API_APP" "$GATEWAY_APP"; do
            STANDBY_REV=$(az containerapp show \
              -n "$APP" -g "$RESOURCE_GROUP" \
              --query "properties.configuration.ingress.traffic[?label=='${ACTIVE}'].revisionName | [0]" \
              -o tsv 2>/dev/null || echo "")
            if [[ -n "$STANDBY_REV" ]]; then
              az containerapp revision activate \
                -n "$APP" -g "$RESOURCE_GROUP" \
                --revision "$STANDBY_REV" || true
              echo "Reactivated $APP standby: $STANDBY_REV"
            fi

            az containerapp ingress traffic set \
              -n "$APP" -g "$RESOURCE_GROUP" \
              --label-weight ${ACTIVE}=100 ${INACTIVE}=0
            echo "$APP traffic → $ACTIVE (100%) ✓"
          done

          echo "Rollback complete. Check logs before re-deploying."

  # ─────────────────────────────────────────────────────────────────────────────
  # Cleanup: deactivate every revision except the one now serving live traffic.
  # This covers:
  #   - The old active revision (was live, now standby at 0% — deactivated to
  #     save cost; can be reactivated in <60s for rollback if needed).
  #   - Any older unlabeled revisions left over from previous deploys.
  #
  # The live revision (INACTIVE label, 100% traffic) is always kept running.
  # Only runs when swap + smoke succeeded.
  # ─────────────────────────────────────────────────────────────────────────────
  cleanup:
    name: Cleanup — deactivate all non-live revisions
    runs-on: ubuntu-latest
    needs: [resolve, swap]
    if: success()
    env:
      INACTIVE: ${{ needs.resolve.outputs.inactive }}

    steps:
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deactivate all non-live API revisions
        run: |
          echo "Resolving live API revision (label: $INACTIVE)..."
          LIVE_REV=$(az containerapp show \
            -n "$API_APP" -g "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.traffic[?label=='${INACTIVE}'].revisionName | [0]" \
            -o tsv)
          echo "Live revision: $LIVE_REV — keeping this one running"

          az containerapp revision list \
            -n "$API_APP" -g "$RESOURCE_GROUP" \
            --query "[].name" -o tsv | while read -r REV; do
              if [[ "$REV" == "$LIVE_REV" ]]; then
                echo "  KEEP:       $REV (live)"
              else
                az containerapp revision deactivate \
                  -n "$API_APP" -g "$RESOURCE_GROUP" \
                  --revision "$REV" || true
                echo "  Deactivated: $REV"
              fi
            done

      - name: Deactivate all non-live Gateway revisions
        run: |
          echo "Resolving live Gateway revision (label: $INACTIVE)..."
          LIVE_REV=$(az containerapp show \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.traffic[?label=='${INACTIVE}'].revisionName | [0]" \
            -o tsv)
          echo "Live revision: $LIVE_REV — keeping this one running"

          az containerapp revision list \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --query "[].name" -o tsv | while read -r REV; do
              if [[ "$REV" == "$LIVE_REV" ]]; then
                echo "  KEEP:       $REV (live)"
              else
                az containerapp revision deactivate \
                  -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
                  --revision "$REV" || true
                echo "  Deactivated: $REV"
              fi
            done
