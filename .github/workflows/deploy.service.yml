name: Deploy Service (Blue-Green)

on:
  # Auto-deploy after a successful CI run on main (which publishes images)
  workflow_run:
    workflows: ["Build & Test (CI)"]
    types: [completed]
    branches: [main]
  # Manual redeploy or rollback — pass a specific SHA to revert
  workflow_dispatch:
    inputs:
      sha:
        description: "Image SHA to deploy (leave blank for latest main)"
        required: false
        default: ""

env:
  IMAGE_API:      ghcr.io/${{ github.repository_owner }}/byteai-api
  IMAGE_GATEWAY:  ghcr.io/${{ github.repository_owner }}/byteai-gateway
  RESOURCE_GROUP: byteai-rg
  API_APP:        byteai-api
  GATEWAY_APP:    byteai-gateway
  ENV_NAME:       byteai-env

permissions:
  contents: read
  packages: read
  id-token: write    # OIDC login to Azure

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Gate: only run when CI publish succeeded
  # ─────────────────────────────────────────────────────────────────────────────
  gate:
    name: Gate — CI must have succeeded
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - run: echo "CI passed or manual trigger — proceeding with deployment"

  # ─────────────────────────────────────────────────────────────────────────────
  # Resolve: compute SHA, slots, collision-safe suffix, FQDNs
  # Outputs all values consumed by downstream jobs so Azure login happens once.
  # ─────────────────────────────────────────────────────────────────────────────
  resolve:
    name: Resolve — slots, suffix, FQDNs
    runs-on: ubuntu-latest
    needs: gate
    outputs:
      sha:            ${{ steps.vars.outputs.sha }}
      suffix:         ${{ steps.vars.outputs.suffix }}
      inactive:       ${{ steps.vars.outputs.inactive }}
      api_active_rev: ${{ steps.vars.outputs.api_active_rev }}
      gw_active_rev:  ${{ steps.vars.outputs.gw_active_rev }}
      gw_fqdn:        ${{ steps.vars.outputs.gw_fqdn }}
      env_domain:     ${{ steps.vars.outputs.env_domain }}

    steps:
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve all deployment variables
        id: vars
        run: |
          # ── Deploy SHA ────────────────────────────────────────────────────────
          if [[ -n "${{ inputs.sha }}" ]]; then
            SHA="${{ inputs.sha }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi

          # ── Active revision per app (independent — each app tracked separately)
          API_ACTIVE=$(az containerapp revision list \
            -n "$API_APP" -g "$RESOURCE_GROUP" \
            --query "[?properties.trafficWeight==\`100\`].name | [0]" -o tsv 2>/dev/null || echo "")

          GW_ACTIVE=$(az containerapp revision list \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --query "[?properties.trafficWeight==\`100\`].name | [0]" -o tsv 2>/dev/null || echo "")

          echo "API  active revision: ${API_ACTIVE:-(none)}"
          echo "GW   active revision: ${GW_ACTIVE:-(none)}"

          # ── Slot direction (blue→green or green→blue) based on API ────────────
          if [[ "$API_ACTIVE" == *"--g-"* ]]; then
            INACTIVE="blue"
          else
            INACTIVE="green"
          fi

          # ── Collision-safe suffix: slot + sha6 + epoch-seconds last 4 digits ──
          # Prevents same-revision reuse when the same SHA is redeployed.
          SHA_SHORT=$(echo "$SHA" | cut -c1-6)
          TS=$(printf '%04d' $(( $(date +%s) % 10000 )))
          SUFFIX="${INACTIVE:0:1}-${SHA_SHORT}-${TS}"

          # ── External FQDN (gateway) + env default domain (for label URLs) ─────
          GW_FQDN=$(az containerapp show \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          ENV_DOMAIN=$(az containerapp env show \
            -n "$ENV_NAME" -g "$RESOURCE_GROUP" \
            --query "properties.defaultDomain" -o tsv)

          echo "Slot:       active=$([[ $INACTIVE == blue ]] && echo green || echo blue) → inactive=$INACTIVE"
          echo "Suffix:     $SUFFIX"
          echo "GW FQDN:    $GW_FQDN"
          echo "Env domain: $ENV_DOMAIN"

          echo "sha=$SHA"                    >> $GITHUB_OUTPUT
          echo "suffix=$SUFFIX"              >> $GITHUB_OUTPUT
          echo "inactive=$INACTIVE"          >> $GITHUB_OUTPUT
          echo "api_active_rev=$API_ACTIVE"  >> $GITHUB_OUTPUT
          echo "gw_active_rev=$GW_ACTIVE"    >> $GITHUB_OUTPUT
          echo "gw_fqdn=$GW_FQDN"           >> $GITHUB_OUTPUT
          echo "env_domain=$ENV_DOMAIN"      >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy API: new revision at 0% traffic, wait for Running (not ScaledToZero)
  # min-replicas=1 forces the container to actually start so ACA health probes
  # run and prove the revision is healthy before traffic is ever sent to it.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → inactive slot
    runs-on: ubuntu-latest
    needs: resolve
    env:
      SHA:      ${{ needs.resolve.outputs.sha }}
      SUFFIX:   ${{ needs.resolve.outputs.suffix }}
      INACTIVE: ${{ needs.resolve.outputs.inactive }}

    steps:
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Guard — API must be in Multiple revision mode
        run: |
          MODE=$(az containerapp show -n "$API_APP" -g "$RESOURCE_GROUP" \
            --query "properties.configuration.activeRevisionsMode" -o tsv)
          if [[ "$MODE" != "Multiple" ]]; then
            echo "ERROR: $API_APP is not in Multiple revision mode (got: $MODE). Fix in Terraform before deploying."
            exit 1
          fi
          echo "$API_APP revision mode: $MODE ✓"

      - name: Deploy new API revision at 0% traffic
        run: |
          # min-replicas=1 ensures the container starts and ACA probes run.
          # The revision is created with 0% traffic — it won't serve users until swap.
          az containerapp update \
            -n "$API_APP" -g "$RESOURCE_GROUP" \
            --image "$IMAGE_API:$SHA" \
            --revision-suffix "$SUFFIX" \
            --min-replicas 1 \
            --set-env-vars \
              "ConnectionStrings__Postgres=${{ secrets.DATABASE_URL }}" \
              "Groq__ApiKey=${{ secrets.GROQ_API_KEY }}" \
              "Cors__AllowedOrigin=${{ secrets.FRONTEND_URL }}" \
              "Supabase__Url=${{ secrets.SUPABASE_URL }}" \
              "Supabase__JwtSecret=${{ secrets.SUPABASE_JWT_SECRET }}" \
              "Supabase__ServiceRoleKey=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --no-wait
          echo "Submitted revision: ${API_APP}--${SUFFIX}"

      - name: Poll API revision → Running (reject ScaledToZero)
        run: |
          REV="${API_APP}--${SUFFIX}"
          echo "Polling $REV for Running state (30 × 15s = 7.5 min max)..."
          for i in $(seq 1 30); do
            STATE=$(az containerapp revision show \
              -n "$API_APP" -g "$RESOURCE_GROUP" \
              --revision "$REV" \
              --query "properties.runningState" -o tsv 2>/dev/null || echo "Provisioning")
            echo "  Attempt $i/30: $STATE"
            if [[ "$STATE" == "Running" || "$STATE" == "RunningAtMaxScale" ]]; then
              echo "API revision $REV is $STATE ✓"
              exit 0
            fi
            if [[ "$STATE" == "Stopped" || "$STATE" == "Failed" || "$STATE" == "Degraded" ]]; then
              echo "ERROR: API revision entered terminal failure state: $STATE"
              exit 1
            fi
            sleep 15
          done
          echo "ERROR: API revision did not reach Running state within 7.5 minutes"
          exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy Gateway: new revision at 0% traffic, label it, HTTP health check
  # Gateway is external so we can probe its label URL directly from CI.
  # Runs after API is confirmed Running — gateway needs a live API to route to.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-gateway:
    name: Deploy Gateway → inactive slot
    runs-on: ubuntu-latest
    needs: [resolve, deploy-api]
    env:
      SHA:        ${{ needs.resolve.outputs.sha }}
      SUFFIX:     ${{ needs.resolve.outputs.suffix }}
      INACTIVE:   ${{ needs.resolve.outputs.inactive }}
      ENV_DOMAIN: ${{ needs.resolve.outputs.env_domain }}

    steps:
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Guard — Gateway must be in Multiple revision mode
        run: |
          MODE=$(az containerapp show -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --query "properties.configuration.activeRevisionsMode" -o tsv)
          if [[ "$MODE" != "Multiple" ]]; then
            echo "ERROR: $GATEWAY_APP is not in Multiple revision mode (got: $MODE). Fix in Terraform before deploying."
            exit 1
          fi
          echo "$GATEWAY_APP revision mode: $MODE ✓"

      - name: Deploy new Gateway revision at 0% traffic
        run: |
          # No --min-replicas override: gateway stays at scale-to-zero until the
          # label URL curl below forces it to start. This avoids a known ACA quirk
          # where --min-replicas in Multiple revision mode updates the app template
          # but may not apply to the in-flight revision, causing an indefinite
          # ScaledToZero poll. The HTTP health check is the real gate.
          az containerapp update \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --image "$IMAGE_GATEWAY:$SHA" \
            --revision-suffix "$SUFFIX" \
            --set-env-vars \
              "ApiUpstreamUrl=http://$API_APP" \
              "ApiKeys=${{ secrets.API_KEYS }}" \
              "Cors__AllowedOrigin=${{ secrets.FRONTEND_URL }}" \
            --no-wait
          echo "Submitted revision: ${GATEWAY_APP}--${SUFFIX}"

      - name: Poll Gateway revision → provisioned (accept ScaledToZero, reject failures)
        run: |
          # We only need the revision to exist without errors. ScaledToZero is fine
          # here — the label URL curl in the next steps is what forces scale-up and
          # acts as the real health gate.
          REV="${GATEWAY_APP}--${SUFFIX}"
          echo "Polling $REV for provisioned state (20 × 10s = 3.5 min max)..."
          for i in $(seq 1 20); do
            STATE=$(az containerapp revision show \
              -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
              --revision "$REV" \
              --query "properties.runningState" -o tsv 2>/dev/null || echo "Provisioning")
            echo "  Attempt $i/20: $STATE"
            if [[ "$STATE" == "Running" || "$STATE" == "RunningAtMaxScale" || "$STATE" == "ScaledToZero" ]]; then
              echo "Gateway revision $REV is provisioned ($STATE) ✓"
              break
            fi
            if [[ "$STATE" == "Stopped" || "$STATE" == "Failed" || "$STATE" == "Degraded" ]]; then
              echo "ERROR: Gateway revision entered terminal failure state: $STATE"
              exit 1
            fi
            if [[ "$i" -eq 20 ]]; then
              echo "ERROR: Gateway revision not provisioned after 3.5 minutes (last: $STATE)"
              exit 1
            fi
            sleep 10
          done

      - name: Label inactive Gateway revision
        run: |
          az containerapp revision label add \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --revision "${GATEWAY_APP}--${SUFFIX}" \
            --label "$INACTIVE" \
            --yes

      - name: HTTP health check — Gateway via label URL (triggers scale-up + verifies response)
        run: |
          # Hitting the label URL is what wakes the container if ScaledToZero.
          # ACA scales the revision up on first request to its label endpoint.
          # We give it generous retries to cover cold-start time.
          # Label URL format: https://<label>---<app>.<env-domain>
          LABEL_URL="https://${INACTIVE}---${GATEWAY_APP}.${ENV_DOMAIN}/health/ready"
          echo "Probing: $LABEL_URL"
          for i in $(seq 1 18); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$LABEL_URL" || echo "000")
            echo "  Attempt $i/18: HTTP $HTTP"
            if [[ "$HTTP" == "200" ]]; then
              echo "Gateway health check passed ✓"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: Gateway label health check failed after 18 attempts (last: HTTP $HTTP)"
          exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Swap: atomically shift 100% traffic to new revisions, then smoke-test.
  # On smoke failure: auto-rollback both apps to the previous revision.
  # ─────────────────────────────────────────────────────────────────────────────
  swap:
    name: Swap traffic + smoke test
    runs-on: ubuntu-latest
    needs: [resolve, deploy-gateway]
    env:
      SUFFIX:         ${{ needs.resolve.outputs.suffix }}
      INACTIVE:       ${{ needs.resolve.outputs.inactive }}
      API_ACTIVE_REV: ${{ needs.resolve.outputs.api_active_rev }}
      GW_ACTIVE_REV:  ${{ needs.resolve.outputs.gw_active_rev }}
      GW_FQDN:        ${{ needs.resolve.outputs.gw_fqdn }}

    steps:
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap API traffic → new revision 100%
        run: |
          NEW_REV="${API_APP}--${SUFFIX}"
          SUB=$(az account show --query id -o tsv)

          if [[ -n "$API_ACTIVE_REV" ]]; then
            TRAFFIC="[{\"revisionName\":\"${NEW_REV}\",\"weight\":100},{\"revisionName\":\"${API_ACTIVE_REV}\",\"weight\":0}]"
          else
            TRAFFIC="[{\"revisionName\":\"${NEW_REV}\",\"weight\":100}]"
          fi

          az rest --method patch \
            --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.App/containerApps/${API_APP}?api-version=2023-05-01" \
            --body "{\"properties\":{\"configuration\":{\"ingress\":{\"traffic\":${TRAFFIC}}}}}"
          echo "API traffic → $NEW_REV (100%) ✓"

      - name: Swap Gateway traffic → new revision 100%
        run: |
          NEW_REV="${GATEWAY_APP}--${SUFFIX}"
          SUB=$(az account show --query id -o tsv)

          if [[ -n "$GW_ACTIVE_REV" ]]; then
            TRAFFIC="[{\"revisionName\":\"${NEW_REV}\",\"weight\":100},{\"revisionName\":\"${GW_ACTIVE_REV}\",\"weight\":0}]"
          else
            TRAFFIC="[{\"revisionName\":\"${NEW_REV}\",\"weight\":100}]"
          fi

          az rest --method patch \
            --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.App/containerApps/${GATEWAY_APP}?api-version=2023-05-01" \
            --body "{\"properties\":{\"configuration\":{\"ingress\":{\"traffic\":${TRAFFIC}}}}}"
          echo "Gateway traffic → $NEW_REV (100%) ✓"

      - name: Post-swap smoke test — production endpoint (5 × 10s)
        id: smoke
        run: |
          echo "Smoke testing: https://$GW_FQDN/health/ready"
          PASSED=false
          for i in $(seq 1 5); do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://$GW_FQDN/health/ready" || echo "000")
            echo "  Attempt $i/5: HTTP $HTTP"
            if [[ "$HTTP" == "200" ]]; then
              echo "Smoke test passed ✓"
              PASSED=true
              break
            fi
            sleep 10
          done
          # Write output before exit so rollback step can read it
          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          if [[ "$PASSED" != "true" ]]; then
            echo "ERROR: Production smoke test failed (last HTTP: $HTTP)"
            exit 1
          fi

      # Runs only when the smoke step specifically failed — swap steps failing
      # means traffic state is unknown; smoke failure means new code is bad.
      - name: AUTO-ROLLBACK — restore previous revisions
        if: failure() && steps.smoke.outputs.passed == 'false'
        run: |
          SUB=$(az account show --query id -o tsv)
          echo "ROLLBACK: new deploy is unhealthy — restoring previous revisions"

          if [[ -n "$API_ACTIVE_REV" ]]; then
            az containerapp revision activate \
              -n "$API_APP" -g "$RESOURCE_GROUP" \
              --revision "$API_ACTIVE_REV" || true
            TRAFFIC="[{\"revisionName\":\"${API_ACTIVE_REV}\",\"weight\":100},{\"revisionName\":\"${API_APP}--${SUFFIX}\",\"weight\":0}]"
            az rest --method patch \
              --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.App/containerApps/${API_APP}?api-version=2023-05-01" \
              --body "{\"properties\":{\"configuration\":{\"ingress\":{\"traffic\":${TRAFFIC}}}}}"
            echo "API rolled back to $API_ACTIVE_REV ✓"
          fi

          if [[ -n "$GW_ACTIVE_REV" ]]; then
            az containerapp revision activate \
              -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
              --revision "$GW_ACTIVE_REV" || true
            TRAFFIC="[{\"revisionName\":\"${GW_ACTIVE_REV}\",\"weight\":100},{\"revisionName\":\"${GATEWAY_APP}--${SUFFIX}\",\"weight\":0}]"
            az rest --method patch \
              --url "https://management.azure.com/subscriptions/${SUB}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.App/containerApps/${GATEWAY_APP}?api-version=2023-05-01" \
              --body "{\"properties\":{\"configuration\":{\"ingress\":{\"traffic\":${TRAFFIC}}}}}"
            echo "Gateway rolled back to $GW_ACTIVE_REV ✓"
          fi

          echo "Rollback complete. Investigate logs before re-deploying."

  # ─────────────────────────────────────────────────────────────────────────────
  # Cleanup: deactivate old revisions for both apps (cost saving).
  # Old revisions stay registered for instant rollback via manual workflow_dispatch.
  # Only runs when swap + smoke succeeded.
  # ─────────────────────────────────────────────────────────────────────────────
  cleanup:
    name: Cleanup — deactivate old revisions
    runs-on: ubuntu-latest
    needs: [resolve, swap]
    if: success()
    env:
      API_ACTIVE_REV: ${{ needs.resolve.outputs.api_active_rev }}
      GW_ACTIVE_REV:  ${{ needs.resolve.outputs.gw_active_rev }}

    steps:
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deactivate old API revision
        run: |
          if [[ -n "$API_ACTIVE_REV" ]]; then
            az containerapp revision deactivate \
              -n "$API_APP" -g "$RESOURCE_GROUP" \
              --revision "$API_ACTIVE_REV" || true
            echo "Deactivated old API revision: $API_ACTIVE_REV ✓"
          else
            echo "No previous API revision to deactivate"
          fi

      - name: Deactivate old Gateway revision
        run: |
          if [[ -n "$GW_ACTIVE_REV" ]]; then
            az containerapp revision deactivate \
              -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
              --revision "$GW_ACTIVE_REV" || true
            echo "Deactivated old Gateway revision: $GW_ACTIVE_REV ✓"
          else
            echo "No previous Gateway revision to deactivate"
          fi
