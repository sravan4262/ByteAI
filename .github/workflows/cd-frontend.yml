  #           NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
  #         tags: ghcr.io/${{ github.repository_owner }}/byteai-ui:${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy directly to SWA production (Oryx build from source)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to SWA
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Set SWA runtime app settings before deploy so they're available at warm-up
      - name: Set SWA runtime app settings
        run: |
          az staticwebapp appsettings set \
            --name byteai-ui \
            --resource-group byteai-rg \
            --setting-names \
              CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}" \
              NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}" \
              NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}"

      # ── Deploy to SWA production ──────────────────────────────────────────────
      - name: Deploy to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOY_TOKEN }}
          repo_token:                       ${{ secrets.GITHUB_TOKEN }}
          action:                           upload
          app_location:                     /UI
          output_location:                  ""
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL:               ${{ secrets.NEXT_PUBLIC_API_URL }}

