name: Deploy Service (Blue-Green)

on:
  # Auto-deploy after a successful CI run on main (which publishes images)
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Manual redeploy or rollback — pass a specific SHA to revert
  workflow_dispatch:
    inputs:
      sha:
        description: "Image SHA to deploy (leave blank for latest main)"
        required: false
        default: ""

env:
  IMAGE_API:     ghcr.io/${{ github.repository_owner }}/byteai-api
  IMAGE_GATEWAY: ghcr.io/${{ github.repository_owner }}/byteai-gateway
  RESOURCE_GROUP: byteai-rg
  API_APP:        byteai-api
  GATEWAY_APP:    byteai-gateway
  ENV_NAME:       byteai-env

permissions:
  contents: read
  packages: read
  id-token: write    # OIDC login to Azure

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Gate: only run when CI publish succeeded (skip on CI failure)
  # ─────────────────────────────────────────────────────────────────────────────
  check:
    name: Gate — CI must have succeeded
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - run: echo "CI passed or manual trigger — proceeding with deployment"

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy: inactive slot → migrations → health check → swap traffic
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (blue-green)
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Resolve deploy SHA ───────────────────────────────────────────────────
      - name: Resolve deploy SHA
        id: sha
        run: |
          if [[ -n "${{ inputs.sha }}" ]]; then
            SHA="${{ inputs.sha }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Deploying SHA: $SHA"

      # ── Detect active / inactive slot ────────────────────────────────────────
      - name: Detect active slot
        id: slot
        run: |
          ACTIVE_REV=$(az containerapp revision list \
            -n "$API_APP" -g "$RESOURCE_GROUP" \
            --query "[?properties.trafficWeight==\`100\`].name | [0]" -o tsv 2>/dev/null || echo "")

          echo "Current active revision: $ACTIVE_REV"

          if [[ "$ACTIVE_REV" == *"green"* ]]; then
            ACTIVE="green"; INACTIVE="blue"
          else
            ACTIVE="blue"; INACTIVE="green"
          fi

          SUFFIX="${INACTIVE}-${{ github.run_number }}"
          echo "active=$ACTIVE"     >> $GITHUB_OUTPUT
          echo "inactive=$INACTIVE" >> $GITHUB_OUTPUT
          echo "suffix=$SUFFIX"     >> $GITHUB_OUTPUT
          echo "active_rev=$ACTIVE_REV" >> $GITHUB_OUTPUT
          echo "Deploying to slot: $INACTIVE (suffix: $SUFFIX)"

      # ── Deploy new revisions at 0% traffic ───────────────────────────────────
      - name: Deploy API → inactive slot (0% traffic)
        run: |
          az containerapp update \
            -n "$API_APP" -g "$RESOURCE_GROUP" \
            --image "$IMAGE_API:${{ steps.sha.outputs.sha }}" \
            --revision-suffix "${{ steps.slot.outputs.suffix }}" \
            --set-env-vars \
              "ConnectionStrings__Postgres=${{ secrets.DATABASE_URL }}" \
              "Clerk__Authority=${{ secrets.CLERK_AUTHORITY }}" \
              "Clerk__WebhookSecret=${{ secrets.CLERK_WEBHOOK_SECRET }}" \
              "Groq__ApiKey=${{ secrets.GROQ_API_KEY }}" \
              "Cors__AllowedOrigin=${{ secrets.FRONTEND_URL }}"

      # ── Wait for API provisioning to complete before touching Gateway ─────────
      - name: Wait for API provisioning to complete
        run: |
          echo "Waiting for byteai-api provisioning to complete..."
          for i in $(seq 1 18); do
            STATE=$(az containerapp show \
              -n "$API_APP" -g "$RESOURCE_GROUP" \
              --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Unknown")
            echo "Attempt $i/18: provisioningState = $STATE"
            if [[ "$STATE" == "Succeeded" ]]; then
              echo "API provisioning complete"
              break
            fi
            if [[ "$STATE" == "Failed" || "$STATE" == "Canceled" ]]; then
              echo "ERROR: API provisioning ended in state $STATE"
              exit 1
            fi
            sleep 10
          done

      - name: Deploy Gateway → inactive slot (0% traffic)
        run: |
          az containerapp update \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --image "$IMAGE_GATEWAY:${{ steps.sha.outputs.sha }}" \
            --revision-suffix "${{ steps.slot.outputs.suffix }}" \
            --set-env-vars \
              "ApiUpstreamUrl=http://$API_APP" \
              "ApiKeys=${{ secrets.API_KEYS }}" \
              "Cors__AllowedOrigin=${{ secrets.FRONTEND_URL }}"

      # ── Health gate 1: wait for API revision Running state ───────────────────
      - name: Health gate — API revision reaches Running state
        run: |
          API_REV="${API_APP}--${{ steps.slot.outputs.suffix }}"
          echo "Waiting for revision $API_REV to reach Running state..."
          for i in $(seq 1 18); do
            STATE=$(az containerapp revision show \
              -n "$API_APP" -g "$RESOURCE_GROUP" \
              --revision "$API_REV" \
              --query "properties.runningState" -o tsv 2>/dev/null || echo "Unknown")
            echo "Attempt $i/18: state = $STATE"
            if [[ "$STATE" == "Running" || "$STATE" == "RunningAtMaxScale" ]]; then
              echo "API revision is $STATE — proceeding"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: API revision did not reach Running state within 3 minutes"
          exit 1


      # ── Health gate 2: label inactive revision + HTTP check ──────────────────
      - name: Label inactive Gateway revision
        run: |
          GW_REV="${GATEWAY_APP}--${{ steps.slot.outputs.suffix }}"
          INACTIVE="${{ steps.slot.outputs.inactive }}"
          az containerapp ingress traffic set \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --label-revision "${INACTIVE}=${GW_REV}" \
            --revision-weight "${GW_REV}=0"

      - name: Health gate — HTTP check on inactive Gateway slot
        run: |
          INACTIVE="${{ steps.slot.outputs.inactive }}"
          ENV_DOMAIN=$(az containerapp env show \
            -n "$ENV_NAME" -g "$RESOURCE_GROUP" \
            --query "properties.defaultDomain" -o tsv)
          URL="https://${GATEWAY_APP}---${INACTIVE}.${ENV_DOMAIN}/health/ready"
          echo "Health check URL: $URL"
          for i in $(seq 1 12); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            echo "Attempt $i/12: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Health check passed — swapping traffic"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: Health check failed after 2 minutes — aborting deployment"
          exit 1

      # ── Swap: 100% traffic to newly promoted slot ─────────────────────────────
      - name: Swap API traffic
        run: |
          INACTIVE_REV="${API_APP}--${{ steps.slot.outputs.suffix }}"
          ACTIVE_REV="${{ steps.slot.outputs.active_rev }}"

          az containerapp ingress traffic set \
            -n "$API_APP" -g "$RESOURCE_GROUP" \
            --revision-weight "${INACTIVE_REV}=100" "${ACTIVE_REV}=0"

          echo "API traffic swapped: $INACTIVE_REV is now live"

      - name: Swap Gateway traffic
        run: |
          INACTIVE_REV="${GATEWAY_APP}--${{ steps.slot.outputs.suffix }}"
          ACTIVE_GW_REV=$(az containerapp revision list \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --query "[?properties.trafficWeight==\`100\`].name | [0]" -o tsv 2>/dev/null || echo "")

          az containerapp ingress traffic set \
            -n "$GATEWAY_APP" -g "$RESOURCE_GROUP" \
            --revision-weight "${INACTIVE_REV}=100" "${ACTIVE_GW_REV}=0"

          echo "Gateway traffic swapped: $INACTIVE_REV is now live"
          echo "Deploy complete — ${{ steps.slot.outputs.inactive }} slot is now production"

      # ── Deactivate old revision (cost saving — instant reactivate for rollback)
      - name: Deactivate previous revision
        if: success()
        run: |
          ACTIVE_REV="${{ steps.slot.outputs.active_rev }}"
          if [[ -n "$ACTIVE_REV" ]]; then
            az containerapp revision deactivate \
              -n "$API_APP" -g "$RESOURCE_GROUP" \
              --revision "$ACTIVE_REV" || true
            echo "Deactivated old revision: $ACTIVE_REV"
          fi
