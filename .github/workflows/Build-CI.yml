name: Build & Test (CI)

on:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend — build & test
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      - name: Restore
        run: dotnet restore Service/ByteAI.sln

      - name: Build
        run: dotnet build Service/ByteAI.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test Service/ByteAI.sln
          --no-build --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./test-results/*.trx

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend — build & test
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: UI/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: UI
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: UI
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: http://localhost:8090
        run: pnpm run build

      - name: Test
        working-directory: UI
        run: pnpm test

  # ─────────────────────────────────────────────────────────────────────────────
  # Publish Docker images to GHCR — after build & test pass
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

  # ─────────────────────────────────────────────────────────────────────────────
  # DB — apply Supabase migrations after images are published, before CD triggers
  # ─────────────────────────────────────────────────────────────────────────────
  db:
    name: DB — apply migrations
    needs: [publish]
    uses: ./.github/workflows/supabase.yml
    secrets: inherit

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./Service
          file:    ./Service/Dockerfile.api
          push:    true
          tags: |
            ghcr.io/${{ github.repository_owner }}/byteai-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/byteai-api:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & push Gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./Service
          file:    ./Service/Dockerfile.gateway
          push:    true
          tags: |
            ghcr.io/${{ github.repository_owner }}/byteai-gateway:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/byteai-gateway:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Save SHA for CD
        run: echo "${{ github.sha }}" > sha.txt

      - name: Upload SHA artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-sha
          path: sha.txt
          retention-days: 7
