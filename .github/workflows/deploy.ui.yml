name: Deploy UI (Azure Static Web Apps)

on:
  # Auto-deploy after a successful CI run on main
  workflow_run:
    workflows: ["Build & Test (CI)"]
    types: [completed]
    branches: [main]
  # Manual deploy or rollback
  workflow_dispatch:
    inputs:
      sha:
        description: "Git SHA to deploy (leave blank for latest main)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write
  pull-requests: write    # SWA action posts PR comments

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Gate: only run when CI succeeded
  # ─────────────────────────────────────────────────────────────────────────────
  check:
    name: Gate — CI must have succeeded
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - run: echo "CI passed or manual trigger — proceeding with frontend deployment"

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to SWA → health check → rollback on failure (Free SKU, no staging slot)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to SWA
    runs-on: ubuntu-latest
    needs: check

    steps:
      # ── Resolve deploy SHA ───────────────────────────────────────────────────
      - name: Resolve deploy SHA
        id: sha
        run: |
          if [[ -n "${{ inputs.sha }}" ]]; then
            SHA="${{ inputs.sha }}"
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Deploying SHA: $SHA"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Store previous good SHA for rollback ─────────────────────────────────
      - name: Read last known good SHA
        id: prev
        run: |
          PREV=$(az staticwebapp show \
            --name byteai-ui \
            --resource-group byteai-rg \
            --query "tags.lastGoodSha" -o tsv 2>/dev/null || echo "")
          echo "prev_sha=${PREV}" >> $GITHUB_OUTPUT
          echo "Last good SHA: ${PREV:-none}"

      # ── Set SWA runtime app settings ─────────────────────────────────────────
      - name: Set SWA runtime app settings
        run: |
          az staticwebapp appsettings set \
            --name byteai-ui \
            --resource-group byteai-rg \
            --setting-names \
              NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
              NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
              NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"

      # ── Deploy to production ──────────────────────────────────────────────────
      - name: Deploy to SWA production
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOY_TOKEN }}
          repo_token:                       ${{ secrets.GITHUB_TOKEN }}
          action:                           upload
          app_location:                     /UI
          output_location:                  ""
        env:
          NEXT_PUBLIC_API_URL:             ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SUPABASE_URL:        ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:   ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # ── Health check on production ────────────────────────────────────────────
      - name: Health check — production
        id: health
        run: |
          URL="${{ steps.deploy.outputs.static_web_app_url }}"
          if [[ -z "$URL" ]]; then
            URL="https://byteai-ui.azurestaticapps.net"
          fi
          echo "Health check URL: $URL"
          for i in $(seq 1 12); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
            echo "Attempt $i/12: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: Health check failed after 2 minutes"
          exit 1

      # ── Record last good SHA on success ──────────────────────────────────────
      - name: Record last good SHA
        if: success()
        run: |
          az staticwebapp update \
            --name byteai-ui \
            --resource-group byteai-rg \
            --tags lastGoodSha="${{ steps.sha.outputs.sha }}"
          echo "Recorded last good SHA: ${{ steps.sha.outputs.sha }}"

      # ── Rollback if health check failed ──────────────────────────────────────
      - name: Rollback — checkout previous good SHA
        if: failure() && steps.prev.outputs.prev_sha != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.prev.outputs.prev_sha }}

      - name: Rollback — redeploy previous good SHA
        if: failure() && steps.prev.outputs.prev_sha != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOY_TOKEN }}
          repo_token:                       ${{ secrets.GITHUB_TOKEN }}
          action:                           upload
          app_location:                     /UI
          output_location:                  ""
        env:
          NEXT_PUBLIC_API_URL:             ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SUPABASE_URL:        ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:   ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Rollback — annotate failure
        if: failure()
        run: |
          echo "::error::Frontend deployment failed. Rolled back to ${{ steps.prev.outputs.prev_sha || 'unknown (no prior good SHA recorded)' }}"
