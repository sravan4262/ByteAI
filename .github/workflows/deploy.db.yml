name: Deploy — Supabase DB

on:
  workflow_dispatch:
    inputs:
      clean_slate:
        description: 'Drop all app schemas and reseed from scratch (destructive — data loss!)'
        type: boolean
        default: false
        required: false
      wipe_supabase_auth:
        description: 'Also wipe Supabase auth.users and storage buckets (DANGEROUS — production wipe)'
        type: boolean
        default: false
        required: false
      confirmation:
        description: "Type 'WIPE-PROD' to confirm wipe_supabase_auth (required only when that box is ticked)"
        type: string
        default: ''
        required: false
  workflow_call:
    inputs:
      clean_slate:
        description: 'Drop all app schemas and reseed from scratch (destructive — data loss!)'
        type: boolean
        default: false
        required: false
      wipe_supabase_auth:
        description: 'Also wipe Supabase auth.users and storage buckets (DANGEROUS — production wipe)'
        type: boolean
        default: false
        required: false
      confirmation:
        description: "Type 'WIPE-PROD' to confirm wipe_supabase_auth (required only when that box is ticked)"
        type: string
        default: ''
        required: false

jobs:
  deploy-schema:
    name: Apply schema & migrations
    runs-on: ubuntu-latest
    # TODO: configure GitHub environment "production-destructive" with required reviewers
    # in repo Settings → Environments. Once created, gate destructive runs by adding:
    #   environment: ${{ (inputs.wipe_supabase_auth == true || inputs.clean_slate == true) && 'production-destructive' || '' }}
    # (GitHub does not support fully conditional environments today; the simplest
    # safe option is to set `environment: production-destructive` unconditionally
    # once the environment exists.)

    steps:
      - uses: actions/checkout@v4

      # ── Guard: typed-confirmation required when wiping Supabase auth/storage ──
      - name: Validate wipe confirmation
        if: ${{ inputs.wipe_supabase_auth == true }}
        run: |
          if [ "${{ inputs.confirmation }}" != "WIPE-PROD" ]; then
            echo "::error::Supabase wipe requested but confirmation phrase incorrect. Type 'WIPE-PROD' to confirm."
            exit 1
          fi

      # ── Clean slate: drop all app schemas before migrating ────────────────────
      # Cascades drop all tables, indexes, RLS policies, and functions inside
      # each schema. Migration 001 recreates them; subsequent migrations rebuild
      # all tables; seeds repopulate data.
      - name: Clean slate — drop app schemas
        if: ${{ inputs.clean_slate == true }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" <<'SQL'
            DROP SCHEMA IF EXISTS lookups CASCADE;
            DROP SCHEMA IF EXISTS users CASCADE;
            DROP SCHEMA IF EXISTS bytes CASCADE;
            DROP SCHEMA IF EXISTS interviews CASCADE;
          SQL
          echo "All app schemas dropped"

      # ── Wipe Supabase auth users + storage objects ────────────────────────────
      # Independent of clean_slate: auth.* and storage.* live outside the app
      # schemas, so dropping app schemas does NOT remove users or files. Runs
      # after clean_slate (if enabled) and BEFORE migrations/seeds so that any
      # seeded users/files land in a freshly emptied auth + storage layer.
      - name: Wipe Supabase auth users and storage
        if: ${{ inputs.wipe_supabase_auth == true }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          echo "::warning::Wiping all Supabase auth users and storage objects"

          # Delete all auth users (paginate)
          page=1
          while : ; do
            USERS_JSON=$(curl -fsS \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              "$SUPABASE_URL/auth/v1/admin/users?page=$page&per_page=200")
            USER_IDS=$(echo "$USERS_JSON" | jq -r '.users[].id // empty')
            if [ -z "$USER_IDS" ]; then break; fi
            for uid in $USER_IDS; do
              echo "  delete user $uid"
              curl -fsS -X DELETE \
                -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
                "$SUPABASE_URL/auth/v1/admin/users/$uid" > /dev/null
            done
            page=$((page+1))
          done
          echo "auth.users wiped"

          # Empty all storage buckets
          BUCKETS=$(curl -fsS \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/storage/v1/bucket" | jq -r '.[].name')
          for bucket in $BUCKETS; do
            echo "  emptying bucket $bucket"
            OBJECTS=$(curl -fsS -X POST \
              -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
              -H "Content-Type: application/json" \
              -d '{"prefix":"","limit":1000}' \
              "$SUPABASE_URL/storage/v1/object/list/$bucket" | jq -r '.[].name // empty')
            for obj in $OBJECTS; do
              curl -fsS -X DELETE \
                -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
                -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
                "$SUPABASE_URL/storage/v1/object/$bucket/$obj" > /dev/null || true
            done
          done
          echo "storage buckets emptied"

      # ── Apply pending migrations in sort order ─────────────────────────────────
      # Migration files follow the naming convention: YYYYMMDDHHMMSS_description.sql
      # Each migration must be idempotent (use IF NOT EXISTS, ON CONFLICT DO NOTHING).
      - name: Apply migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          MIGRATION_DIR="supabase/migrations"

          if [ -z "$(ls -A $MIGRATION_DIR/*.sql 2>/dev/null)" ]; then
            echo "No migration files found — skipping"
            exit 0
          fi

          for f in $(ls -1 "$MIGRATION_DIR"/*.sql | sort); do
            echo "Applying migration: $f"
            psql "$SUPABASE_DB_URL" -f "$f"
          done

          echo "All migrations applied"

      # ── Apply seeds in the order defined in supabase/config.toml ─────────────
      # Parses sql_paths array directly — config.toml is the single source of truth.
      - name: Apply seeds
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          awk '/^sql_paths/,/^\]/' supabase/config.toml \
            | grep -E '^\s+"' \
            | sed 's/^[[:space:]]*"//; s/"[,]*$//' \
            | while read -r pattern; do
                for f in supabase/${pattern#./}; do
                  echo "Seeding: $f"
                  psql "$SUPABASE_DB_URL" -f "$f"
                done
              done
          echo "All seeds applied"
